version: "3.8"

services:
  vina-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./out:/out
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
